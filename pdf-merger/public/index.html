<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22223a;
      --border: #2e2e45;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --danger: #f87171;
      --success: #34d399;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 32px var(--accent-glow);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e8e8f0, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: rgba(124, 106, 247, 0.03);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .drop-zone.drag-over .drop-icon { transform: scale(1.1); }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 14px;
      transition: transform 0.2s ease;
      display: block;
    }

    .drop-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .drop-sub {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .drop-sub span {
      color: var(--accent2);
      font-weight: 500;
      cursor: pointer;
    }

    #file-input { display: none; }

    .badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 99px;
      margin-top: 12px;
    }

    /* File list */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 28px 0 14px;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .count-badge {
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      color: var(--accent2);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 99px;
    }

    #file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: grab;
      transition: all 0.15s ease;
      user-select: none;
    }

    .file-item:active { cursor: grabbing; }

    .file-item.dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }

    .file-item.drag-target {
      border-color: var(--accent);
      background: rgba(124, 106, 247, 0.1);
    }

    .file-item.uploading {
      border-color: var(--accent);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 0 6px transparent; }
    }

    .drag-handle {
      color: var(--muted);
      font-size: 1rem;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .file-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #f87171, #fb923c);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.775rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-status {
      font-size: 0.775rem;
      color: var(--accent2);
      margin-top: 2px;
    }

    .order-num {
      width: 26px;
      height: 26px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 1rem;
      transition: all 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .remove-btn:hover { background: rgba(248, 113, 113, 0.15); color: var(--danger); }

    /* Actions */
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b6cf7);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124, 106, 247, 0.4);
    }

    .btn-primary:not(:disabled):active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-secondary:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Progress */
    .progress-wrap {
      margin-top: 20px;
      display: none;
    }

    .progress-wrap.visible { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar-track {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #c084fc);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      font-size: 0.875rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideIn 0.25s ease;
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }

    .toast-icon { font-size: 1.1rem; }

    @keyframes slideIn {
      from { transform: translateX(24px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(24px); }
    }

    /* Empty state */
    .empty-hint {
      text-align: center;
      padding: 24px 0 8px;
      color: var(--muted);
      font-size: 0.875rem;
      display: none;
    }

    .hint-steps {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .watermark {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: transparent;
      background: linear-gradient(90deg, #3a3a5c, #5a4fcf, #3a3a5c);
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0.55;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      text-transform: lowercase;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .step-num {
      width: 28px;
      height: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent2);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">📄</div>
      <h1>PDF Merger</h1>
    </div>
    <p class="subtitle">Drag, reorder, and merge your PDF files instantly — no data leaves your machine.</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <span class="drop-icon">📂</span>
      <div class="drop-title">Drop PDFs here</div>
      <div class="drop-sub">or <span id="browse-link">browse files</span></div>
      <div class="badge">PDF only · Max 100 MB per file · Up to 20 files</div>
      <input type="file" id="file-input" accept="application/pdf" multiple />
    </div>

    <div id="list-section" style="display:none">
      <div class="section-header">
        <span class="section-title">Files to merge</span>
        <span class="count-badge" id="count-badge">0 files</span>
      </div>
      <div id="file-list"></div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label">
          <span id="progress-text">Uploading…</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" id="clear-btn">🗑 Clear all</button>
        <button class="btn btn-primary" id="merge-btn" disabled>✨ Merge PDFs</button>
      </div>
    </div>

    <div class="hint-steps" id="hint-steps">
      <div class="step"><div class="step-num">1</div>Upload PDFs</div>
      <div class="step"><div class="step-num">2</div>Reorder by drag</div>
      <div class="step"><div class="step-num">3</div>Download merged</div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <div class="watermark">made by sri_amxn</div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const browseLink = document.getElementById('browse-link');
    const fileList = document.getElementById('file-list');
    const listSection = document.getElementById('list-section');
    const countBadge = document.getElementById('count-badge');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const progressPct = document.getElementById('progress-pct');
    const hintSteps = document.getElementById('hint-steps');

    let files = []; // { id, name, size, uploaded }
    let dragSrcIndex = null;

    browseLink.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    async function handleFiles(fileObjects) {
      const pdfs = Array.from(fileObjects).filter(f => f.type === 'application/pdf');
      if (!pdfs.length) { toast('Please select PDF files only.', 'error'); return; }
      if (files.length + pdfs.length > 20) { toast('Maximum 20 files allowed.', 'error'); return; }

      const placeholders = pdfs.map(f => ({
        id: null,
        name: f.name,
        size: f.size,
        uploaded: false,
        file: f,
      }));
      files.push(...placeholders);
      renderList();

      const formData = new FormData();
      pdfs.forEach(f => formData.append('pdfs', f));

      showProgress('Uploading…', 0);

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload');

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            showProgress('Uploading…', pct);
          }
        });

        const result = await new Promise((resolve, reject) => {
          xhr.onload = () => {
            if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
            else reject(new Error(xhr.responseText));
          };
          xhr.onerror = () => reject(new Error('Network error'));
          xhr.send(formData);
        });

        result.files.forEach((serverFile, i) => {
          const ph = placeholders[i];
          ph.id = serverFile.id;
          ph.uploaded = true;
          delete ph.file;
        });

        hideProgress();
        updateMergeBtn();
        renderList();
        toast(`${pdfs.length} file${pdfs.length > 1 ? 's' : ''} uploaded successfully.`, 'success');
      } catch (err) {
        placeholders.forEach(ph => {
          const idx = files.indexOf(ph);
          if (idx !== -1) files.splice(idx, 1);
        });
        hideProgress();
        renderList();
        toast('Upload failed. Please try again.', 'error');
      }
    }

    function renderList() {
      const hasFiles = files.length > 0;
      listSection.style.display = hasFiles ? 'block' : 'none';
      hintSteps.style.display = hasFiles ? 'none' : 'flex';
      countBadge.textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item' + (f.uploaded ? '' : ' uploading');
        item.draggable = f.uploaded;
        item.dataset.index = i;

        item.innerHTML = `
          <span class="drag-handle">⠿</span>
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
            <div class="${f.uploaded ? 'file-size' : 'file-status'}">${f.uploaded ? formatSize(f.size) : 'Uploading…'}</div>
          </div>
          <div class="order-num">${i + 1}</div>
          <button class="remove-btn" data-index="${i}" title="Remove" ${f.uploaded ? '' : 'disabled'}>✕</button>
        `;

        if (f.uploaded) {
          item.addEventListener('dragstart', onDragStart);
          item.addEventListener('dragover', onDragOver);
          item.addEventListener('drop', onDrop);
          item.addEventListener('dragend', onDragEnd);
        }

        item.querySelector('.remove-btn')?.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFile(parseInt(e.currentTarget.dataset.index));
        });

        fileList.appendChild(item);
      });
    }

    function onDragStart(e) {
      dragSrcIndex = parseInt(e.currentTarget.dataset.index);
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-target'));
      e.currentTarget.classList.add('drag-target');
    }

    function onDrop(e) {
      e.preventDefault();
      const targetIndex = parseInt(e.currentTarget.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      const moved = files.splice(dragSrcIndex, 1)[0];
      files.splice(targetIndex, 0, moved);
      renderList();
    }

    function onDragEnd(e) {
      dragSrcIndex = null;
      document.querySelectorAll('.file-item').forEach(el => {
        el.classList.remove('dragging', 'drag-target');
      });
    }

    async function removeFile(index) {
      const f = files[index];
      if (f.id) {
        fetch(`/file/${f.id}`, { method: 'DELETE' }).catch(() => {});
      }
      files.splice(index, 1);
      renderList();
      updateMergeBtn();
    }

    clearBtn.addEventListener('click', async () => {
      const ids = files.filter(f => f.id).map(f => f.id);
      ids.forEach(id => fetch(`/file/${id}`, { method: 'DELETE' }).catch(() => {}));
      files = [];
      renderList();
      updateMergeBtn();
    });

    mergeBtn.addEventListener('click', async () => {
      const uploadedFiles = files.filter(f => f.uploaded);
      if (uploadedFiles.length < 2) { toast('Add at least 2 PDFs to merge.', 'error'); return; }

      mergeBtn.disabled = true;
      mergeBtn.textContent = '⏳ Merging…';
      showProgress('Merging PDFs…', 60);

      try {
        const res = await fetch('/merge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order: uploadedFiles.map(f => f.id) }),
        });

        if (!res.ok) throw new Error((await res.json()).error);
        const { downloadId } = await res.json();

        showProgress('Done! Starting download…', 100);
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = `/download/${downloadId}`;
          a.download = 'merged.pdf';
          a.click();
          hideProgress();
          toast('PDFs merged and download started!', 'success');
        }, 400);
      } catch (err) {
        toast('Merge failed: ' + err.message, 'error');
        hideProgress();
      } finally {
        mergeBtn.disabled = false;
        mergeBtn.innerHTML = '✨ Merge PDFs';
        updateMergeBtn();
      }
    });

    function updateMergeBtn() {
      const ready = files.filter(f => f.uploaded).length;
      mergeBtn.disabled = ready < 2;
    }

    function showProgress(label, pct) {
      progressWrap.classList.add('visible');
      progressText.textContent = label;
      progressPct.textContent = pct + '%';
      progressFill.style.width = pct + '%';
    }

    function hideProgress() {
      progressWrap.classList.remove('visible');
    }

    function toast(msg, type = 'info') {
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => {
        el.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
